name: HKRE Scheduled Scraper

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
      GOOGLE_OAUTH_JSON: ${{ secrets.GOOGLE_OAUTH_JSON }}
      GOOGLE_TOKEN_JSON_B64: ${{ secrets.GOOGLE_TOKEN_JSON_B64 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install system dependencies (Java + Xvfb + Chrome libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jre-headless xvfb unzip \
            libnss3 libxss1 libatk-bridge2.0-0 libgtk-3-0 fonts-liberation \
            libgbm1 xdg-utils libu2f-udev libcups2 libdrm2
          sudo apt-get install -y libasound2t64 2>/dev/null || sudo apt-get install -y libasound2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure config and Tabula JAR
        run: |
          mkdir -p config
          JAR=src/converters/tabula-1.0.2-jar-with-dependencies.jar
          if [ ! -f "$JAR" ]; then
            echo "Downloading Tabula JAR..."
            curl -sL -o "$JAR" \
              "https://github.com/tabulapdf/tabula-java/releases/download/v1.0.2/tabula-1.0.2-jar-with-dependencies.jar"
          fi
          test -f "$JAR" || { echo "Tabula JAR missing and download failed"; exit 1; }

      - name: Seed OAuth token for Drive (CI)
        if: env.GOOGLE_TOKEN_JSON_B64 != ''
        run: |
          echo "$GOOGLE_TOKEN_JSON_B64" | base64 --decode > config/credentials.json

      - name: Run scraper
        run: xvfb-run -a python src/main.py
        working-directory: ${{ github.workspace }}
